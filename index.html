<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card with Bootstrap 5</title>
    <meta name="description" content="Карточка товара Трактор Lovol H854 — мощная и надёжная сельскохозяйственная техника для эффективной работы на полях.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-5">
    <div class="card shadow-sm">
        <div class="row g-0 align-items-center">
      
            <div class="col-12 col-md-6 order-last order-md-first">
                <img src="i.jpg" class="img-fluid rounded-start" alt="Трактор Lovol H854">
            </div>
            
          
            <div class="col-12 col-md-6">
                <div class="card-body">
                    <h2 class="card-title fw-bold">Трактор Lovol H854</h2>
                    <p class="card-text text-muted mb-3">Мощный универсальный трактор Lovol H854  идеальный выбор для сельскохозяйственных работ. Обладает высокой производительностью, надёжной конструкцией и комфортным управлением.</p>
                    <p class="card-text mb-3">
                        <span class="h4 text-success fw-bold">₽90 000</span>
                        <del class="text-secondary ms-2">₽95 990</del>
                    </p>
                    <a href="#" class="btn btn-primary w-100">Купить сейчас</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js" integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS" crossorigin="anonymous"></script>
</body>
</html>
