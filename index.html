<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card with Bootstrap 5</title>
    <meta name="description" content="Карточка товара Трактор Lovol H854 — мощная и надёжная сельскохозяйственная техника для эффективной работы на полях.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
<div class="container my-5">
    <div class="row g-4 align-items-center">
        <div class="col-md-6 col-lg-5 order-last order-md-first"> 
            <img src="i.jpg" class="img-fluid rounded shadow-sm" />
        </div>
        <div class="col-md-6 col-lg-7">
            <h2 class="fw-bold mb-3">Трактор Lovol H854</h2>
            <p class="lead fw-normal text-muted">Мощный универсальный трактор Lovol H854 — идеальный выбор для сельскохозяйственных работ. Обладает высокой производительностью, надёжной конструкцией и комфортным управлением. Подходит для вспашки, посева, уборки и других задач на полях.</p>
            <div>
                <span class="display-6 fw-bolder text-success">₽90 000</span>
                <del class="text-secondary ms-2">₽95 990</del>
            </div>
            <a href="#" class="btn btn-primary mt-3 w-100 shadow-sm">Купить сейчас</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js" integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS" crossorigin="anonymous"></script>
</html>
